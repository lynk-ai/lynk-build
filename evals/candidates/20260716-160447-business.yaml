- name: nursery-order-customer-relationship
  status: needs_revision
  inputs:
    question: We run an online plant nursery. Our warehouse has an orders table (order_id, customer_id,
      order_ts, total_cents, warehouse_id), a customers table (customer_id, region, acquired_channel),
      and a warehouses table (warehouse_id, state). We want to break our order revenue down by the customer's
      region and the channel they came in through, even though those columns live on the customers table.
      How do we set that up so an order 'knows' its customer's region and channel without us pre-joining
      everything into one big table?
  metadata:
    perspective: business
    tags:
    - relationships
    - feature
    - joins
    business: plant-nursery
    expected_docs:
      required:
      - semantics_docs/concepts/entity/schema-yml/relationships.md
      - semantics_docs/concepts/entity/schema-yml/feature.md
      optional:
      - semantics_docs/concepts/entity/schema-yml/README.md
      - semantics_docs/concepts/entity/schema-yml/metric.md
      - semantics_docs/SUMMARY.md
    optimal_hops: 4
    rubric: 'Pass requires ALL of:

      - Declares a relationship on the orders entity that points to the customers table/entity (a join
      path), rather than the user hand-writing a SQL join

      - States the relationship is directional and carries a cardinality (many orders to one customer)

      - Defines the customer''s region and acquired_channel as features on orders whose value is pulled
      across that relationship

      Must NOT:

      - Model the region/channel cross-table lookup as a metric

      - Claim orders and customers must be pre-joined or flattened into one physical table before they
      can be queried together

      Bonus (does not affect pass):

      - Notes that order revenue itself is a metric (an aggregation defined on orders), distinct from
      the features pulled across the relationship'
    rationale: 'relationships.md owns that a relationship declares a directional join path from an entity
      to another physical table or entity, specified with per-step cardinality (many orders -> one customer),
      which removes the need to pre-flatten tables. feature.md owns that a feature can be a value pulled
      across a relationship, so customers.region and customers.acquired_channel become row-grain features
      on orders. schema-yml/README.md (optional) situates relationships and features inside schema.yml;
      metric.md (optional) owns that revenue is an aggregation/metric. Optimal path: SUMMARY.md (hop1
      — TOC lists the schema.yml children) → concepts/entity/schema-yml/README.md (hop2 — schema.yml is
      where relationships and features are declared) → concepts/entity/schema-yml/relationships.md (hop3
      — declare the directional many-to-one join to customers) → concepts/entity/schema-yml/feature.md
      (hop4 — define region/channel as features pulled across that relationship).'
